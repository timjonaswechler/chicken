name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Test & Coverage
        run: cargo xtask test --ci --coverage

      - name: Write coverage summary
        run: |
          echo "## Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Crate | Feature | Lines | Functions | Branches |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|---------|-------|-----------|----------|" >> $GITHUB_STEP_SUMMARY

          for file in cov-*.json; do
            name=$(basename "$file" .json | sed 's/cov-//')
            lines=$(jq -r '.data[0].totals.lines.percent // 0 | . * 10 | round | . / 10' "$file")
            funcs=$(jq -r '.data[0].totals.functions.percent // 0 | . * 10 | round | . / 10' "$file")
            branches=$(jq -r '.data[0].totals.branches.percent // 0 | . * 10 | round | . / 10' "$file")
            crate=$(echo "$name" | cut -d- -f1-2 | sed 's/-/ /g')
            feat=$(echo "$name" | cut -d- -f3)
            echo "| $crate | ${feat:--} | ${lines}% | ${funcs}% | ${branches}% |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: cov-*.json
          retention-days: 7
