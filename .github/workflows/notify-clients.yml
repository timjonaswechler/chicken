name: Notify Clients

on:
  push:
    tags:
      - 'v*'

jobs:
  notify-fos-client:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout chicken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Get current chicken tag in fos_client
        id: current
        env:
          GH_TOKEN: ${{ secrets.FOC_CLIENT_TOKEN }}
        run: |
          # Lese Cargo.toml aus fos_client main branch
          CARGO_TOML=$(gh api repos/timjonaswechler/fos_client/contents/Cargo.toml \
            --jq '.content' | base64 -d)

          # Extrahiere aktuellen tag
          CURRENT_TAG=$(echo "$CARGO_TOML" | grep -oP 'tag = "\Kv[^"]+')

          echo "current-tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "Current chicken tag in fos_client: $CURRENT_TAG"

      - name: Generate release notes
        id: notes
        run: |
          NEW_TAG="${{ github.ref_name }}"
          CURRENT_TAG="${{ steps.current.outputs.current-tag }}"

          if [ -z "$CURRENT_TAG" ]; then
            # Kein vorheriger Tag — alle Commits bis zum neuen Tag
            NOTES=$(git cliff --config cliff.toml "$NEW_TAG" --strip header)
          else
            # Range vom aktuellen bis zum neuen Tag
            NOTES=$(git cliff --config cliff.toml "$CURRENT_TAG".."$NEW_TAG" --strip header)
          fi

          # Multiline output
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "Generated release notes:"
          echo "$NOTES"

      - name: Checkout fos_client
        uses: actions/checkout@v4
        with:
          repository: timjonaswechler/fos_client
          token: ${{ secrets.FOC_CLIENT_TOKEN }}
          path: fos_client

      - name: Create PR in fos_client
        env:
          GH_TOKEN: ${{ secrets.FOC_CLIENT_TOKEN }}
        run: |
          NEW_TAG="${{ github.ref_name }}"
          BRANCH="chore/update-chicken-${NEW_TAG}"

          cd fos_client

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          # Bump chicken tag in Cargo.toml
          sed -i "s|chicken = { git = \"https://github.com/timjonaswechler/chicken\", tag = \"v[^\"]*\" }|chicken = { git = \"https://github.com/timjonaswechler/chicken\", tag = \"${NEW_TAG}\" }|" Cargo.toml

          git add Cargo.toml
          git commit -m "chore(deps): update chicken to ${NEW_TAG}"
          git push origin "$BRANCH"

          # PR erstellen
          gh pr create \
            --repo timjonaswechler/fos_client \
            --base main \
            --head "$BRANCH" \
            --title "chore(deps): update chicken to ${NEW_TAG}" \
            --body "$(cat <<PREOF
          ## chicken ${NEW_TAG}

          > ✏️ **Replace this PR title** with a meaningful description of what the user will notice.
          > Example: \`feat(multiplayer): add lobby browser\`

          ### Änderungen in chicken

          ${{ steps.notes.outputs.notes }}
          PREOF
          )"
